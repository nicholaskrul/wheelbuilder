name: Keep Wheelbuilder App Alive

on:
  schedule:
    # Runs every 6 hours (at minute 0 of 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual triggering directly from the GitHub Actions tab

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Request
        run: |
          curl -s -L "https://wheelbuilder.streamlit.app" > /dev/null
          echo "Successfully sent keep-alive ping to Streamlit App!"
